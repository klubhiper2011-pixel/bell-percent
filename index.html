<!doctype html><html lang='ko'><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Bell Percent</title><link rel='manifest' href='manifest.json'><style>body{font-family:Arial;max-width:480px;margin:auto;padding:20px}input{width:100%;padding:10px;margin:6px 0;font-size:18px}.r{font-size:24px;color:green;font-weight:bold}</style><h1>% 계산기</h1><h2>%CHG</h2><input id=old placeholder='이전값' type=number><input id=newv placeholder='현재값' type=number><div id=cr class=r></div><h2>%TOTL</h2><input id=part placeholder='부분' type=number><input id=tot placeholder='전체' type=number><div id=tr class=r></div><script>function c(){let o=+old.value,n=+newv.value;if(o)cr.textContent=(((n-o)/o)*100).toFixed(2)+' %';else cr.textContent='';let p=+part.value,t=+tot.value;if(t)tr.textContent=((p/t)*100).toFixed(2)+' %';else tr.textContent='';}document.querySelectorAll('input').forEach(i=>i.oninput=c);if('serviceWorker'in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}</script></html>
